let songs = [...defaultSongs];
let isPlaying = false;
let currentTrackIndex = 0;

// DOM Elements
const audio = document.getElementById('audioPlayer');
const playerCard = document.getElementById('playerCard');
const btnPlay = document.getElementById('btnPlay');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const trackName = document.getElementById('trackName');
const artistName = document.getElementById('artistName');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const currTimeText = document.getElementById('currTime');
const durationText = document.getElementById('duration');
const songListContainer = document.getElementById('songList');
const themeToggle = document.getElementById('themeToggle');

window.addEventListener('DOMContentLoaded', () => {
    renderPlaylist();
    loadTrack(currentTrackIndex);
});

function toggleFlip() {
    playerCard.classList.toggle('flipped');
}

// 2. FUNGSI LOAD LAGU
function loadTrack(index) {
    if(songs.length === 0) return;
    
    currentTrackIndex = index;
    const currentSong = songs[index];

    audio.src = currentSong.url;
    trackName.innerText = currentSong.title;
    artistName.innerText = currentSong.artist;
    
    document.querySelectorAll('.song-item').forEach((item, idx) => {
        if(idx === index) item.classList.add('active');
        else item.classList.remove('active');
    });
}

// 3. LOGIKA KONTROL AUDIO (SHUFFLE OTOMATIS)
function playTrack() {
    if (!audio.src || audio.src === window.location.href) {
        let nextIndex = nextShuffleTrack();
        loadTrack(nextIndex);
    }
    isPlaying = true;
    btnPlay.innerText = "⏸";
    audio.play().catch(e => console.log("Menunggu interaksi pengguna."));
}

function pauseTrack() {
    isPlaying = false;
    btnPlay.innerText = "▶";
    audio.pause();
}

function nextShuffleTrack() {
    if (songs.length <= 1) return 0;
    let randomIndex;
    do {
        randomIndex = Math.floor(Math.random() * songs.length);
    } while (randomIndex === currentTrackIndex);
    
    return randomIndex;
}

// Event Listeners tombol utama
btnPlay.addEventListener('click', () => {
    if (isPlaying) pauseTrack(); else playTrack();
});

btnNext.addEventListener('click', () => {
    let nextIndex = nextShuffleTrack();
    loadTrack(nextIndex);
    playTrack();
});

btnPrev.addEventListener('click', () => {
    let prevIndex = nextShuffleTrack();
    loadTrack(prevIndex);
    playTrack();
});

// 4. TIMELINE & PROGRESS BAR
audio.addEventListener('timeupdate', () => {
    if(audio.duration) {
        const progressPercent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = `${progressPercent}%`;

        let curMins = Math.floor(audio.currentTime / 60);
        let curSecs = Math.floor(audio.currentTime % 60);
        let durMins = Math.floor(audio.duration / 60);
        let durSecs = Math.floor(audio.duration % 60);

        if(curSecs < 10) curSecs = "0" + curSecs;
        if(durSecs < 10) durSecs = "0" + durSecs;

        currTimeText.innerText = `${curMins}:${curSecs}`;
        durationText.innerText = `-${durMins}:${durSecs}`;
    }
});

progressBar.addEventListener('click', (e) => {
    const width = progressBar.clientWidth;
    const clickX = e.offsetX;
    const duration = audio.duration;
    if(duration) {
        audio.currentTime = (clickX / width) * duration;
    }
});

audio.addEventListener('ended', () => {
    let nextIndex = nextShuffleTrack();
    loadTrack(nextIndex);
    playTrack();
});

// 5. RENDER DAFTAR PLAYLIST
function renderPlaylist() {
    songListContainer.innerHTML = '';
    songs.forEach((song, index) => {
        const songItem = document.createElement('div');
        songItem.classList.add('song-item');
        if(index === currentTrackIndex) songItem.classList.add('active');

        songItem.innerHTML = `
            <div class="song-item-info" onclick="selectTrack(${index})">
                <div class="song-item-title">${song.title}</div>
                <div class="song-item-artist">${song.artist}</div>
            </div>
        `;
        songListContainer.appendChild(songItem);
    });
}

function selectTrack(index) {
    loadTrack(index);
    playTrack();
    toggleFlip();
}

// 6. TOGGLE LIGHT / DARK THEME
themeToggle.addEventListener('click', () => {
    const currentTheme = document.body.getAttribute('data-theme');
    if(currentTheme === 'light') {
        document.body.removeAttribute('data-theme');
        themeToggle.innerText = "Light Mode";
    } else {
        document.body.setAttribute('data-theme', 'light');
        themeToggle.innerText = "Dark Mode";
    }
});
